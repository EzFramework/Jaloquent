remote_theme: just-the-docs/just-the-docs

title: Jaloquent
description: >-
  Eloquent-style active-record ORM for Java — built on EzFramework Java Query Builder.
  Supports SQL (JDBC) and flat-map stores with HasOne, HasMany, BelongsTo, and BelongsToMany relations.

url: "https://ezframework.github.io"
baseurl: "/Jaloquent"

# ── Appearance ────────────────────────────────────────────────────────────────
color_scheme: jaloquent
heading_anchors: true

# ── Header links ──────────────────────────────────────────────────────────────
aux_links:
  "GitHub":
    - "https://github.com/EzFramework/Jaloquent"
  "JitPack":
    - "https://jitpack.io/#EzFramework/Jaloquent"

aux_links_new_tab: true

# ── Navigation ────────────────────────────────────────────────────────────────
nav_sort: case_insensitive
nav_external_links:
  - title: Changelog
    url:   "https://github.com/EzFramework/Jaloquent/releases"
    hide_icon: false

# ── Search ────────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level:       2
  previews:            3
  preview_words_before: 5
  preview_words_after:  10
  tokenizer_separator: /[\s/]+/

# ── Footer ────────────────────────────────────────────────────────────────────
back_to_top:      true
back_to_top_text: "Back to top"

footer_content: >-
  Copyright &copy; 2024&ndash;2026 Gyvex.
  Distributed under the
  <a href="https://github.com/EzFramework/Jaloquent/blob/main/LICENSE">MIT License</a>.

# ── Kramdown ──────────────────────────────────────────────────────────────────
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# ── Build exclusions ──────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
